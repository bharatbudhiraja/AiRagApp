distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.0-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
# Core pool settings
spring.datasource.hikari.maximumPoolSize=12
spring.datasource.hikari.minimumIdle=5

# Timeouts (IMPORTANT - fixes your warning)
spring.datasource.hikari.maxLifetime=540000     # 9 minutes
spring.datasource.hikari.idleTimeout=300000     # 5 minutes
spring.datasource.hikari.connectionTimeout=30000  # 30 sec

# Validation
spring.datasource.hikari.validationTimeout=5000
spring.datasource.hikari.connectionTestQuery=SELECT 1

# Leak detection (optional but useful in dev)
spring.datasource.hikari.leakDetectionThreshold=20000
